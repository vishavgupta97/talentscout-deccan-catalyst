<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="920" fill="#F7F3EA"/>
  <rect x="50" y="40" width="1300" height="840" rx="24" fill="#FFFDF8" stroke="#D7D2C8" stroke-width="2"/>
  <text x="90" y="95" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">TalentScout Architecture</text>
  <text x="90" y="128" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Deccan Catalyst submission flow for JD parsing, candidate matching, outreach simulation, and ranking.</text>

  <rect x="90" y="180" width="230" height="92" rx="16" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="205" y="218" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Recruiter Input</text>
  <text x="205" y="247" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">JD form or JSON API</text>

  <rect x="380" y="180" width="260" height="92" rx="16" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="510" y="218" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">FastAPI App</text>
  <text x="510" y="247" text-anchor="middle" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">UI render + API endpoints</text>

